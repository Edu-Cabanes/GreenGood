
<style>
:root { --green: #3B6D11; --green-light: #EAF3DE; --amber: #BA7517; --amber-light: #FAEEDA; --red: #A32D2D; --red-light: #FCEBEB; }
* { box-sizing: border-box; }
body { margin: 0; padding: 0; }
.wrap { padding: 1rem 0; font-family: var(--font-sans); }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
.score-big { font-size: 48px; font-weight: 500; color: var(--color-text-primary); line-height: 1; }
.score-label { font-size: 13px; color: var(--color-text-secondary); }
.score-sub { font-size: 18px; font-weight: 500; color: var(--amber); }
.bar-wrap { flex: 1; height: 8px; background: var(--color-border-tertiary); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: var(--amber); transition: width .6s ease; }
.grid { display: flex; flex-direction: column; gap: 8px; }
.item { border: 1px solid var(--color-border-tertiary); border-radius: 8px; overflow: hidden; }
.item-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; background: var(--color-background-primary); }
.item-head:hover { background: var(--color-background-secondary); }
.badge { font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.ok   { background: #EAF3DE; color: #27500A; }
.warn { background: #FAEEDA; color: #633806; }
.fail { background: #FCEBEB; color: #791F1F; }
.item-num { font-size: 12px; color: var(--color-text-tertiary); min-width: 18px; }
.item-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.score-pill { font-size: 13px; font-weight: 500; min-width: 28px; text-align: right; }
.score-5 { color: #27500A; }
.score-7 { color: #633806; }
.score-8 { color: #27500A; }
.score-3 { color: #791F1F; }
.score-2 { color: #791F1F; }
.score-6 { color: #633806; }
.score-1 { color: #791F1F; }
.chevron { font-size: 11px; color: var(--color-text-tertiary); transition: transform .2s; }
.open .chevron { transform: rotate(90deg); }
.item-body { display: none; padding: 0 14px 12px; font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; background: var(--color-background-secondary); border-top: 1px solid var(--color-border-tertiary); }
.item-body.visible { display: block; }
.item-body code { font-family: var(--font-mono); font-size: 12px; background: var(--color-background-tertiary); padding: 1px 5px; border-radius: 4px; color: var(--color-text-primary); }
.item-body strong { font-weight: 500; color: var(--color-text-primary); }
.section-tag { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
</style>
<div class="wrap">
  <div class="header">
    <div>
      <div class="score-big">4.6</div>
      <div class="score-label">/ 10 puntuación media</div>
    </div>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span class="score-sub">Necesita mejoras</span>
        <span style="font-size:12px;color:var(--color-text-tertiary)">jardineriagreengood.es</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:46%"></div></div>
    </div>
  </div>

  <div class="grid" id="items"></div>
</div>

<script>
const data = [
  {
    num: 1, title: "Title tag con keyword local", score: 5, status: "warn",
    section: "On-Page",
    current: "«GreenGood | Paisajismo y Jardinería en Salamanca»",
    problem: "La palabra clave de mayor valor («césped artificial Salamanca») no aparece en el title. «Paisajismo» tiene volumen de búsqueda muy bajo localmente. Además, la página de servicio /servicios/cesped-artificial tiene el mismo title que la home — no hay diferenciación.",
    fix: "Home → <code>Césped Artificial en Salamanca | GreenGood</code><br>Servicio → <code>Instalación Césped Artificial Salamanca | GreenGood</code>"
  },
  {
    num: 2, title: "Meta description optimizada", score: 3, status: "fail",
    section: "On-Page",
    current: "No visible en el código renderizado — probablemente genérica o igual en todas las páginas.",
    problem: "Sin meta description diferenciada por página no hay CTR (tasa de clics) desde Google. Es el primer texto que ve un usuario antes de entrar.",
    fix: "Home: <code>Instalación profesional de césped artificial en Salamanca y provincia. Presupuesto sin compromiso en 24h. ☎ 615 667 820</code> (158 car.)"
  },
  {
    num: 3, title: "H1 con keyword principal", score: 2, status: "fail",
    section: "On-Page",
    current: "Home: «Tu jardín en buenas manos». Servicio: «Instalador Especializado Césped Artificial»",
    problem: "El H1 de la home es puramente de branding, sin keyword. Google le da mucho peso al H1. El de la página de servicio tampoco incluye «Salamanca» ni tiene la estructura de keyword transaccional.",
    fix: "Home H1: <code>Instalación de Césped Artificial en Salamanca</code><br>Servicio H1: <code>Instalación Profesional de Césped Artificial en Salamanca</code>"
  },
  {
    num: 4, title: "Velocidad en móvil (Core Web Vitals)", score: 6, status: "warn",
    section: "Técnico",
    current: "Imágenes con nombres con espacios (URL-encoded: <code>rollo%20de%20c%C3%A9sped...</code>). Next.js con Vercel suele rendir bien, pero las imágenes son muy pesadas (3840px de ancho solicitadas).",
    problem: "Imágenes de 3840px para un móvil es un desperdicio brutal. El LCP (Largest Contentful Paint) probablemente sea alto. Además los nombres con espacios son incorrectos para SEO.",
    fix: "Renombrar imágenes: <code>cesped-artificial-rollo.jpg</code> (sin espacios). Revisar en PageSpeed Insights y reducir tamaño de imágenes servidas."
  },
  {
    num: 5, title: "Google Business Profile activo", score: 7, status: "warn",
    section: "SEO Local",
    current: "No se puede verificar desde la web si está reclamado y optimizado. El sitio apunta a Instagram y WhatsApp pero no enlaza a Google Maps.",
    problem: "Sin GBP optimizado, GreenGood no aparecerá en el «Local Pack» (los 3 resultados con mapa que acaparan el 70%+ de clics en búsquedas locales). Es el factor SEO local más importante.",
    fix: "Verificar y optimizar el perfil en <strong>Google Business Profile</strong>. Añadir categoría «Servicio de jardinería», fotos de trabajos, horario y área de servicio."
  },
  {
    num: 6, title: "Reseñas en Google (cantidad y respuestas)", score: 7, status: "warn",
    section: "SEO Local",
    current: "El sitio muestra 3 reseñas con nombres reales (Jesús, Felipe, Ángel) — señal de autenticidad. Sin embargo están embebidas en la web, no hay enlace al perfil de Google.",
    problem: "No se puede saber cuántas reseñas hay en Google sin acceder al GBP. El número de reseñas y su puntuación media influyen directamente en el ranking del Local Pack.",
    fix: "Pedir activamente reseñas a clientes vía WhatsApp post-instalación. Incluir enlace directo al perfil de Google Maps en el footer."
  },
  {
    num: 7, title: "Schema LocalBusiness implementado", score: 1, status: "fail",
    section: "Técnico",
    current: "No detectado en el código de la página. Next.js renderiza bien el HTML pero no se ve ningún JSON-LD de schema.",
    problem: "Sin schema <code>LandscapingBusiness</code>, Google no puede verificar de forma estructurada el nombre, dirección, teléfono, área de cobertura ni los servicios. Reduce la probabilidad de aparecer en el Local Pack.",

  },
  {
    num: 8, title: "Sitemap enviado a Search Console", score: 5, status: "warn",
    section: "Técnico",
    current: "Next.js en Vercel puede generar automáticamente un <code>/sitemap.xml</code>, pero no hay evidencia de que esté enviado a Google Search Console.",
    problem: "Sin sitemap enviado, Google tarda más en descubrir e indexar páginas nuevas (blog, páginas de servicio, páginas de municipios futuras).",
    fix: "Verificar que existe <code>jardineriagreengood.es/sitemap.xml</code> y enviarlo desde Google Search Console → Sitemaps."
  },
  {
    num: 9, title: "Contenido con keywords locales", score: 6, status: "warn",
    section: "Contenido",
    current: "La home menciona «Salamanca» varias veces de forma natural. El blog tiene artículos bien orientados («verano salmantino» es un long-tail excelente). Pero la página de servicio /cesped-artificial es extremadamente corta.",
    problem: "La página de servicio estrella tiene menos de 100 palabras de contenido. Google necesita contexto para entender de qué trata la página. Sin texto, no puede posicionar por keywords transaccionales.",
    fix: "La página de césped artificial necesita mínimo 500 palabras: tipos de césped, proceso de instalación, precios orientativos, municipios donde se trabaja, y preguntas frecuentes."
  },
  {
    num: 10, title: "Presencia en directorios locales", score: 3, status: "fail",
    section: "Off-Page",
    current: "Solo visible en Instagram. No hay menciones a Páginas Amarillas, Yelp, Cámara de Comercio de Salamanca ni otros directorios.",
    problem: "Los directorios locales generan backlinks y consistencia NAP (Nombre/Dirección/Teléfono). Son señales de confianza para Google Maps y para el ranking local.",
    fix: "Registrar en: Páginas Amarillas, Yelp España, Kompass, directorio de la Cámara de Comercio de Salamanca, y Europages."
  }
];

const container = document.getElementById('items');
data.forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'item';
  const sc = d.score;
  const scClass = sc >= 8 ? 'score-8' : sc >= 6 ? 'score-7' : sc >= 4 ? 'score-5' : 'score-3';
  item.innerHTML = `
    <div class="item-head" onclick="toggle(${i})">
      <span class="item-num">${d.num}</span>
      <span class="item-title">${d.title}</span>
      <span class="badge ${d.status}">${d.status === 'ok' ? 'Bien' : d.status === 'warn' ? 'Mejorable' : 'Crítico'}</span>
      <span class="score-pill ${scClass}">${d.score}/10</span>
      <span class="chevron">▶</span>
    </div>
    <div class="item-body" id="body-${i}">
      <div class="section-tag" style="margin-top:8px">${d.section}</div>
      <strong>Estado actual:</strong> ${d.current}<br><br>
      <strong>Problema:</strong> ${d.problem}<br><br>
      <strong>Acción:</strong> ${d.fix}
    </div>
  `;
  container.appendChild(item);
});

function toggle(i) {
  const body = document.getElementById('body-' + i);
  const head = body.previousElementSibling;
  body.classList.toggle('visible');
  head.classList.toggle('open');
}
</script>
